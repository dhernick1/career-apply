# ── PER-EMPLOYER CONTEXT ─────────────────────────────────────────────────────
# Notes on what to probe at each employer when discovering hidden achievements.
# Particularly valuable for long-tenure employers where the base resume
# compresses many years into a few bullets.

employer_context:
  - employer: "TELUS Agriculture & Consumer Goods"
    tenure_years: 9
    surface_area_warning: >
      Resume describes TELUS as client consulting only. Actual work included structured
      research programs (quarterly consumer panels, brand tracking, social listening)
      that read as in-house insights work. Future discovery should always probe TELUS
      for specific research programs, not just "consulting engagements."
    probe_first:
      - "Quarterly or recurring tracking studies (brand awareness, NPS, satisfaction)"
      - "Social listening or digital sentiment programs"
      - "Specific client research outcomes — did insights change a client decision?"
      - "Any proprietary methodology or framework built for a client"

  - employer: "CSM Bakery Solutions"
    tenure_years: 13
    surface_area_warning: >
      13-year tenure compressed into 5 role titles. Each role likely contains 2-3
      additional achievements not on the resume. Divestiture work, McKinsey/Bain/BCG
      engagements, and the Channel Blurring Project are named but under-quantified.
      Innovation pipeline work confirmed but not fully scoped.
    probe_first:
      - "Specific research that influenced the divestiture valuation or positioning"
      - "Innovation pipeline gate research — which gates, which products"
      - "CLT methodology: what was the before/after research cost structure"
      - "Global centralization: total headcount managed across all regions"
      - "Any consumer research tied to the Channel Blurring / McKinsey project"

  - employer: "Bayer Consumer Care"
    tenure_years: 6
    surface_area_warning: >
      Copy testing and packaging research confirmed in RUN-001 but not quantified.
      Bayer had four major OTC brands (Bayer, Aleve, One-A-Day, Alka-Seltzer) —
      research likely touched multiple brands. Innovation team membership confirmed.
    probe_first:
      - "Specific copy or packaging research that changed a launch decision"
      - "Brand equity or health tracking for any of the four OTC brands"
      - "Innovation pipeline role — which products, which stages"
      - "Canadian market research conducted during expatriate assignment"

