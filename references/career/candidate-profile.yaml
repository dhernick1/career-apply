# ── DOMAIN ADJACENCY MAP ─────────────────────────────────────────────────────
# Non-obvious connections between your background and other domains.
# When EVALUATE_ALIGNMENT scores a domain match below 70%, check here before
# declaring a miss.

domain_adjacency_map:
  - source_domain: "RGM Analytics (consulting/vendor side)"
    adjacent_domain: "Trade Promotion Optimization (TPO)"
    evidence: >
      At TELUS/TABS Analytics, Don supplied a TPO platform to CPG clients and advised on
      trade spend allocation to highest-return activities. This is vendor-side TPO experience
      — he understands how TPO systems are designed to drive decisions, not just how to
      operate them as an end user. Directly relevant to roles requiring TPO methodology,
      post-event analytics, and lift/ROI measurement.
    confirmed_in_runs:
      - RUN-002

  - source_domain: "New Product Launch / Go-to-Market"
    adjacent_domain: "Demand Planning and Forecasting"
    evidence: >
      At Bayer Consumer Care, Don built a national demand plan by retail customer for the
      One-A-Day Herbal launch, achieving 2% forecast accuracy, and conducted weekly
      consumption-vs.-supply reviews in market. This is commercial forecasting embedded in
      a go-to-market process, directly applicable to TPM forecasting and planning inputs.
    confirmed_in_runs:
      - RUN-002

  - source_domain: "Trade Budget Management (brand owner side)"
    adjacent_domain: "Trade Spend Optimization / Commercial Planning"
    evidence: >
      At Bayer, Don allocated a $17M trade budget at the regional and retailer level to
      maximize predicted returns. At TELUS, he advised clients on trade spend reallocation.
      Both experiences constitute trade spend optimization logic even without formal TPM
      system ownership. Relevant to commercial planning, checkbook management framing,
      and GTM optimization roles.
    confirmed_in_runs:
      - RUN-002

  - source_domain: "Competitive contract bidding (CSM retailer bids, TELUS service bids)"
    adjacent_domain: "GPO contracting / RFP-RFI bid strategy"
    evidence: >
      At CSM the bakery-components business ran through retailer contract-bidding; at TELUS Don
      bid products and services competitively on a regular basis. This is transferable
      competitive-bid and bid-pricing experience that bridges toward GPO contracting and RFP/RFI
      requirements — though it is NOT GPO-specific. Frame honestly as competitive bidding, not
      GPO mastery. Confirmed RUN-006.
    confirmed_in_runs:
      - RUN-006

  - source_domain: "OTC and supplements distribution (Bayer, Piping Rock)"
    adjacent_domain: "Healthcare distribution / pharmacy wholesaler channel"
    evidence: >
      Bayer OTC distribution and Piping Rock supplements both ran through pharmacy wholesalers
      and distributors — the same channel structure McKesson operates in. Establishes channel
      familiarity for healthcare-distribution roles, though distributor-side GPO/formulary
      mechanics remain a learning curve. Confirmed RUN-006.
    confirmed_in_runs:
      - RUN-006

