    that need sharper quantification. TELUS consulting role has strong relationship outcomes
    but few hard metrics. Discovery should probe CSM and TELUS for cost, revenue, and
    efficiency figures that did not make the resume.

# ── HIGH-YIELD DISCOVERY CATEGORIES ──────────────────────────────────────────
# These are categories confirmed to surface hidden achievements in your career
# history. Ordered by discovery frequency (most reliable first).
# When EVALUATE_ALIGNMENT runs Section D, check these against EVERY employer.
#
# Start empty. Add entries as runs surface them.

high_yield_categories:
  - id: HY-001
    category: "Quarterly tracking and brand panel programs"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
    probe_question: >
      Did you design, manage, or commission any ongoing tracking study — brand health,
      awareness, favorability, conversion, NPS, or satisfaction — at this employer?
    why_undersold: >
      Tracking studies are recurring operational work that practitioners treat as
      table stakes. Don ran a full quarterly consumer panel at TELUS with social
      listening integration that never appeared on his resume until prompted.
    inventory_entries_surfaced:
      - ACH-021

  - id: HY-002
    category: "Cross-functional innovation team membership (VoC/insights representative)"
    confirmed_employers:
      - "CSM Bakery Solutions"
      - "Bayer Consumer Care"
    probe_question: >
      At this employer, were you the insights or research representative on any
      cross-functional product development, innovation, or new product launch team?
      Did you represent the voice of the consumer or marketplace at any stage of
      the innovation pipeline?
    why_undersold: >
      Don participated as the insights voice on innovation teams at both CSM and
      Bayer but described this as supporting work rather than a primary achievement.
      JDs for senior insights roles explicitly require innovation pipeline research
      support — this experience is directly valuable and was absent from the resume.
    inventory_entries_surfaced: []

  - id: HY-003
    category: "Demand planning and new product launch forecasting"
    confirmed_employers:
      - "Bayer Consumer Care"
    probe_question: >
      At this employer, did you build or contribute to a demand plan or sales forecast
      for a new product launch — projecting pipeline fill, account-level volume, or
      in-market consumption? Did you track actual vs. forecast performance post-launch?
    why_undersold: >
      Don built a full national demand plan by retail customer for the One-A-Day Herbal
      launch at Bayer achieving 2% forecast accuracy, with weekly consumption-vs.-supply
      tracking. This never appeared on the resume because it was treated as routine
      launch support work, not a standalone analytical achievement. Roles requiring
      forecasting, commercial planning, or TPM inputs will value this heavily.
    inventory_entries_surfaced:
      - ACH-024

  - id: HY-004
    category: "Trade promotion optimization platform (vendor/supplier side)"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
    probe_question: >
      At this employer, did you supply, configure, demonstrate, or support a trade
      promotion optimization or RGM analytics platform for client use? Did you advise
      clients on trade spend allocation or promotional effectiveness measurement using
      a platform or analytical framework?
    why_undersold: >
      Don supplied CPG clients with a TPO platform at TELUS and advised on trade spend
      reallocation — vendor-side TPO experience that never appeared on the resume because
      it was framed as analytics consulting, not platform work. For roles requiring TPO
      or RGM experience, this is highly relevant and should always be probed.
    inventory_entries_surfaced:
      - ACH-023

  - id: HY-005
    category: "Large-format retail category management (shelf, assortment, category reviews)"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
      - "Bayer Consumer Care"
      - "CSM Bakery Solutions"
    probe_question: >
      At this employer, did your category management or insights work include deliverables
      for large-format retail accounts (Walmart, Target, Kroger, Costco, Albertsons)?
      Specifically: category reviews, assortment optimization, shelf layout recommendations,
      planogram development, or joint business planning presentations?
    why_undersold: >
      Don delivered category reviews, assortment optimization, and shelf layout recommendations
      for Walmart, Target, Kroger, Costco, Albertsons, and Amazon throughout his TELUS tenure,
      and built full 4P category management at Bayer. None of this appeared on the base resume
      because it was framed as "analytics consulting" and "category leadership strategy"
      rather than named as large-format retail category management execution.
    inventory_entries_surfaced:
      - ACH-025
      - ACH-027

  - id: HY-006
    category: "Pricing architecture and price gap analysis"
    confirmed_employers:
      - "Bayer Consumer Care"
    probe_question: >
      At this employer, did your category or commercial work include pricing strategy —
      specifically price gap analysis vs. competitors, price threshold identification,
      or pricing architecture recommendations presented to retail buyers or internal leadership?
    why_undersold: >
      Don built pricing architecture at Bayer through price gap analysis vs. competitors and
      price threshold identification. This was embedded in category leadership work and never
      named as pricing strategy on the resume.
    inventory_entries_surfaced:
      - ACH-027

  - id: HY-007
    category: "White-space and distribution gap identification"
    confirmed_employers:
      - "Playtex Products"
      - "Bayer Consumer Care"
      - "CSM Bakery Solutions"
      - "TELUS Agriculture & Consumer Goods"
    probe_question: >
      At this employer, did any of your category or commercial work involve identifying
      distribution gaps, underpenetrated segments, or white-space opportunities that led
      to new item placement or category expansion?
    why_undersold: >
      White-space identification is a career-long pattern for Don — confirmed at all four
      major employers. It never appeared on the resume because it was treated as a routine
      analytical output rather than a named capability.
    inventory_entries_surfaced:
      - ACH-026

  - id: HY-008
    category: "Private-label / store-brand commercialization (branded + private-label dual fluency)"
    confirmed_employers:
      - "CSM Bakery Solutions"
      - "TELUS Agriculture & Consumer Goods"
      - "Bayer Consumer Care"
    probe_question: >
      At this employer, did you sell, position, or advise on private-label / store-brand
      products against national brands? Did you build the value/quality narrative for why a
      customer should choose private label, or advise on private-label assortment, packaging,
      pricing, or shelf placement?
    why_undersold: >
      Don's private-label experience is deep but was never named on the base resume. CSM was
      an entirely private-label business (13 years); at TELUS he advised large private-label
      clients (Piping Rock, Future Beauty Brands); and his branded OTC work at Bayer/Playtex
      gives him the complementary national-brand lens. This branded + private-label dual
      fluency is rare and highly valuable for any private-brand growth role (e.g., McKesson
      Foster & Thrive, retailer own-brand teams).
    inventory_entries_surfaced:
      - ACH-033
      - ACH-034

  - id: HY-009
    category: "Recent new-business development and account expansion (counters selling-recency risk)"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
    probe_question: >
      At this employer, did you source, win, or expand named new accounts? Can you name the
      specific clients/accounts you brought in or grew, and how you expanded revenue within them?
    why_undersold: >
      The base resume frames TELUS as analytics consulting, hiding the fact that Don actively
      sourced and grew named new accounts (Dyson, Purpose Built Brands, Lakeview Farms, Global
      Beauty) through 2026. For any commercial/sales role, this is the critical evidence that
      Don's selling is current — not stuck in his Playtex/Bayer era (which ended 2003). Always
      surface for sales, BD, and account-management roles.
    inventory_entries_surfaced:
      - ACH-037

  - id: HY-010
    category: "RGM depth — multiyear roadmaps, pack/price architecture, predictive pricing models, volumetric/cannibalization"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
      - "CSM Bakery Solutions"
      - "Bayer Consumer Care"
    probe_question: >
      At this employer, did your pricing/RGM work go beyond one-off analyses? Specifically:
      multiyear pricing or pack-architecture roadmaps; predictive assortment-gain or price-
      elasticity models; designed experiments / test-and-learn; or volumetric and cannibalization
      forecasts for new items and line extensions?
    why_undersold: >
      Don's RGM work at TELUS was framed as generic "analytics consulting" on the base resume,
      hiding specific RGM artifacts: a multi-month multiyear pricing roadmap (consumer durable,
      tariffs), predictive assortment-gain models for test-and-learn, and volumetric/
      cannibalization forecasting across Bayer, CSM, and TELUS. These are the exact deliverables
      senior RGM and insights-leadership JDs ask for. Always probe for the specific RGM artifact,
      not just "pricing experience."
    inventory_entries_surfaced:
      - ACH-038
      - ACH-040
      - ACH-041
      - ACH-042

  - id: HY-011
    category: "AI-enabled insights modernization & governance (and active AI upskilling)"
    confirmed_employers:
      - "TELUS Agriculture & Consumer Goods"
      - "Independent / Professional Development"
    probe_question: >
      At this employer (or currently), did you trial or adopt AI-driven research tools, redesign
      a research workflow to use AI, evaluate AI supplier governance, or otherwise modernize
      insights with AI? Are you actively building AI capability (training, communities, hands-on)?
    why_undersold: >
      Don's AI experience is recent and easy to under-state because his 35-year record predates
      it. He trialed AI research tools and adopted automated coding at TELUS, evaluated supplier
      AI governance, and since Jan 2026 has deliberately upskilled (AI Collective Atlanta, formal
      training, hands-on). For AI-modernization insights roles this is decisive evidence and must
      be surfaced. Frame credibly (portfolio of trials/adoption/governance + active upskilling),
      not as enterprise-scale AI transformation. NOTE: AI belongs in cover letters ONLY for
      AI-centric roles (see [[no-ai-terms-in-cover-letters]] feedback).
    inventory_entries_surfaced:
      - ACH-049
      - ACH-050
      - ACH-051

