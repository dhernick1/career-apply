# references/career/candidate-profile.yaml
# Candidate Profile — context directive for career agent skills
# READ BEFORE EVALUATE_ALIGNMENT Section D
#
# PURPOSE:
# This file holds candidate-specific knowledge that the generic career skills
# cannot contain. It grows with every application run. The evaluate-alignment
# skill reads this before generating discovery prompts — it tells the agent
# WHERE to look, not just WHAT to look for.
#
# MAINTENANCE:
# - After every run: append new high_yield_categories findings
# - After every run: update domain_adjacency_map if new domain evidence surfaces
# - After every run: log resolved gaps under run_history
# - Never delete entries — this is the institutional memory of your job search
#
# SCHEMA:
# high_yield_categories: patterns confirmed to surface hidden achievements
# domain_adjacency_map: non-obvious domain connections discovered across career
# employer_context: per-employer notes on what to probe
# run_history: what each application run discovered

meta:
  owner: "Donald T. Hernick"
  version: 1.0
  last_updated: "2026-07-02"
  seeded_from: "Resume seeded 2026-05-18 from 26 04 07 CV Hernick.Don.2pages.docx. First application run pending."
  work_authorization:
    US: true
    UK: true
    UK_notes: >
      Confirmed 2026-06-05 (RUN-004, Barry Callebaut). Holds UK work authorization —
      no visa sponsorship required for UK roles. Ready to relocate internationally.
      Surface this proactively in cover letters for any UK or EU-based role as a
      differentiator vs. candidates requiring sponsorship.
  note: >
    35+ year CPG career spanning Playtex, Bayer, CSM Bakery Solutions, and TELUS.
    Strongest quantified evidence at Bayer (revenue, OPE, award) and Playtex (rankings,
    quota, volume). CSM tenure is long (13 years) and likely undersells depth -- multiple
