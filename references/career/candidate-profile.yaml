# ── RUN HISTORY ──────────────────────────────────────────────────────────────
# Append after every application run. The agent reads recent entries to learn
# from prior discoveries.

run_history:
  - run_id: RUN-002
    date: "2026-05-22"
    company: "Newell Brands"
    role: "Senior Manager, Trade Promotion Management & Trade Promotion Optimization (TPM & TPO)"
    outcome: "applied"
    match_score_initial: 67
    match_score_final: 75
    ats_result: "PASS (post-tailoring, partial — core TPM/TPO platform keywords absent; not addable without false claims)"
    go_no_go: "GO — Viable, Tier 2"
    resume_delta: "19%"
    new_achievements_surfaced:
      - ACH-023
      - ACH-024
    new_categories_added:
      - HY-003
      - HY-004
    lessons:
      - >
        TELUS/TABS supplied a TPO platform to clients — this is vendor-side TPO experience
        that is distinct from and highly complementary to CPG end-user experience. Should be
        permanently added to the base resume and LinkedIn. Framing: "Supplied CPG clients
        with a TPO platform and advised on trade spend allocation."
      - >
        Demand planning with quantified forecast accuracy (2% at Bayer) is a high-value
        achievement absent from the base resume. Should be added permanently — it speaks
        directly to commercial planning, forecasting, and TPM inputs requirements in
        RGM/commercial analytics roles.
      - >
        "Managed a $17M trade budget" is weaker framing than "allocated a $17M trade budget
        at the regional and retailer level to direct funding toward highest predicted returns."
        Always use the allocation/optimization framing for trade budget achievements.
      - >
        For roles reporting into Enabling Technology (IT), be explicit in interviews that the
        commercial/analytical half is the strength and the platform administration half is a
        learning curve. Do not overclaim system ownership experience.
      - >
        Newell Brands is in active restructuring (900 jobs cut Dec 2025, 31% positive employee
        outlook). Evaluate carefully before accepting any offer — job security at the Senior
        Manager layer is not stable in the near term.

  - run_id: RUN-001
    date: "2026-05-18"
    company: "Georgia-Pacific LLC"
    role: "Insights & Knowledge Director — Retail Towel/Tissue/Napkin"
    outcome: "applied"
    match_score_initial: 82
    match_score_final: 89
    ats_result: "PASS (post-tailoring)"
    go_no_go: "GO — Strong, Tier 1"
    resume_delta: "26%"
    new_achievements_surfaced:
      - ACH-021
      - ACH-022
    new_categories_added:
      - HY-001
      - HY-002
    lessons:
      - >
        TELUS role is consistently undersold. The quarterly consumer panel and social
        listening work is in-house-quality research that belongs on the resume and
        in LinkedIn. Update both before the next application.
      - >
        "Innovation pipeline" and "voice of the consumer" are high-value JD phrases
        that Don's background supports strongly — but neither appeared in the base
        resume. Both should be added to the base resume permanently, not just for GP.
      - >
        LinkedIn headline and About section are misaligned with an insights-focused
        job search. Update LinkedIn before submitting any application to an insights role.
      - >
        The private company / PE-backed angle (CSM Rhone Capital parallel to GP Koch
        Industries) is a differentiation hook that few applicants will have. Lead with
        it in cover letters for Koch Industries / private equity-backed companies.

